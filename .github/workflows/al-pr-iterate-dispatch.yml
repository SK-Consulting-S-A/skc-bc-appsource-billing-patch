name: "AL PR Iterate Dispatcher"

# Lightweight dispatcher that converts trusted PR review comments into
# a workflow_dispatch call to al-pr-iterate.lock.yml in the central
# skc-bc-internal-agents repository.

on:
  pull_request_review_comment:
    types: [created]

permissions:
  actions: write
  pull-requests: read
  issues: write

jobs:
  dispatch:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch al-pr-iterate agent
        id: dispatch
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8 (Node 24)
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || github.token }}
          script: |
            const AGENT_OWNER = 'SK-Consulting-S-A';
            const AGENT_REPO = 'skc-bc-internal-agents';
            const thisRepo = `${context.repo.owner}/${context.repo.repo}`;
            const isLocal = context.repo.repo === AGENT_REPO;
            const comment = context.payload.comment;
            const pr = context.payload.pull_request;
            const association = comment.author_association || 'NONE';
            const trustedAssociations = new Set(['COLLABORATOR', 'MEMBER', 'OWNER']);
            const body = comment.body || '';
            const commandMatch = body.match(/(^|\s)\/(iterate|fix)\b/i);

            if (!commandMatch) {
              core.info('Review comment does not contain /iterate or /fix — skipping.');
              return;
            }

            if (!trustedAssociations.has(association)) {
              core.info(`Author association ${association} is not trusted for auto-dispatch — skipping.`);
              return;
            }

            const patAvailable = Boolean('${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN }}');
            if (!isLocal && !patAvailable) {
              const reason =
                `GH_AW_GITHUB_MCP_SERVER_TOKEN is not available on ${thisRepo}. ` +
                `Grant the org secret to this repository and ensure it has Actions → write on ${AGENT_OWNER}/${AGENT_REPO}.`;
              core.setFailed(reason);
              core.setOutput('failure_reason', reason);
              core.setOutput('pr_number', String(pr.number));
              return;
            }

            const inputs = {
              pr_number: String(pr.number),
              comment_id: String(comment.id),
              pr_branch: pr.head.ref,
              ...(isLocal ? {} : { target_repo: thisRepo }),
            };

            let lastErr;
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: AGENT_OWNER,
                  repo: AGENT_REPO,
                  ref: 'main',
                  workflow_id: 'al-pr-iterate.lock.yml',
                  inputs,
                });
                core.info(`Dispatched al-pr-iterate for ${thisRepo}#${pr.number} comment ${comment.id} (attempt ${attempt})`);
                lastErr = null;
                break;
              } catch (err) {
                lastErr = err;
                const status = err.status ?? 0;
                if (status >= 400 && status < 500) break;
                if (attempt < 3) {
                  const delay = attempt * 5000;
                  core.warning(`Attempt ${attempt} failed (HTTP ${status || 'network'}): ${err.message} — retrying in ${delay / 1000}s…`);
                  await new Promise(r => setTimeout(r, delay));
                }
              }
            }

            if (lastErr) {
              const status = lastErr.status ?? 0;
              const requiredScopes = lastErr.response?.headers?.['x-accepted-github-permissions'] ?? 'actions=write';
              const reason =
                `createWorkflowDispatch on ${AGENT_OWNER}/${AGENT_REPO} failed ` +
                `(HTTP ${status || 'network'}): ${lastErr.message}. Required scopes: ${requiredScopes}.`;
              core.setFailed(reason);
              core.setOutput('failure_reason', reason);
              core.setOutput('pr_number', String(pr.number));
            }

      - name: Post dispatcher-failure comment on PR
        if: failure() && steps.dispatch.outputs.failure_reason != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8 (Node 24)
        with:
          github-token: ${{ github.token }}
          script: |
            const pr_number = Number('${{ steps.dispatch.outputs.pr_number || github.event.pull_request.number }}');
            const reason = `${{ steps.dispatch.outputs.failure_reason }}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '⚠️ **Could not queue the PR review fix request.**',
              '',
              `**Reason:** ${reason}`,
              '',
              `**Run:** [View dispatcher logs](${runUrl})`,
              '',
              'The review comment was not dispatched to `al-pr-iterate`. Re-post the comment after fixing the token / permissions or dispatch the workflow manually from `skc-bc-internal-agents`.',
              '',
              '_Generated by [skc-bc-internal-agents](https://github.com/SK-Consulting-S-A/skc-bc-internal-agents)._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body,
            }).catch(e => core.warning(`Could not post failure comment: ${e.message}`));
