# When a PR workflow or agent-branch workflow fails in this repo, opens a
# tracking issue in skc-bc-internal-agents and dispatches al-ci-fix.
# Re-dispatches after bot fix commits too (until CI passes).
# A rolling cap per PR prevents infinite retries — tune MAX_DISPATCHES / WINDOW_DAYS below.

name: "CI Failure Analysis Dispatcher"

on:
  workflow_run:
    # zizmor: ignore[dangerous-triggers] - secured with same-repo and fork checks below
    # No branches filter — AL-Go validation may run on pull_request events and,
    # in some repos, on direct pushes to agent/* branches too. Filtering is done
    # in the job condition below.
    workflows: ["*"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  # Serialize handling per head SHA so a push failure and a PR failure for the
  # same commit don't create duplicate tracking issues at the same time.
  group: ci-dispatch-${{ github.repository_id }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # Fire for failures on PRs in the same repo (not forks), plus failed push
    # workflows on agent/* branches that back an open PR. Bot-authored commits
    # are allowed so auto-fix can iterate until checks pass.
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      (
        github.event.workflow_run.event == 'pull_request' ||
        (github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, 'agent/'))
      ) &&
      github.event.workflow_run.repository.id == github.repository_id &&
      !github.event.workflow_run.repository.fork &&
      !contains(github.event.workflow_run.name, 'Dispatcher') &&
      !contains(github.event.workflow_run.name, 'Agent') &&
      !contains(github.event.workflow_run.name, 'Triage') &&
      !contains(github.event.workflow_run.name, 'Org Scan') &&
      !contains(github.event.workflow_run.name, 'Auto-assign')
    steps:
      - name: Extract context and create tracking issue in skc-bc-internal-agents
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8 (Node 24)
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || github.token }}
          script: |
            const wr = context.payload.workflow_run;

            // Tracking issues and dispatch always target skc-bc-internal-agents — NOT the repo
            // where this dispatcher is deployed (e.g. Timely).
            const AGENT_OWNER = 'SK-Consulting-S-A';
            const AGENT_REPO  = 'skc-bc-internal-agents';
            const targetRepo  = `${context.repo.owner}/${context.repo.repo}`;
            const prBranch    = wr.head_branch;
            const workflowEvent = wr.event;

            // --- Resolve PR number ---
            // 1. Use the pull_requests array from the event payload (most reliable)
            let prNumber = wr.pull_requests?.[0]?.number;

            // 2. Fallback: search open PRs by matching head SHA + head branch
            if (!prNumber) {
              const headOwner =
                wr.head_repository?.owner?.login || context.repo.owner;
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${headOwner}:${wr.head_branch}`,
              });
              prNumber = prs.find((p) => p.head.sha === wr.head_sha)?.number;
            }

            if (!prNumber) {
              core.warning(
                `No open PR found for workflow run ${wr.id} ` +
                `(head_sha=${wr.head_sha}, branch=${wr.head_branch}). Skipping.`
              );
              return;
            }

            const prMarker = `${targetRepo}#${prNumber}`;
            const headShaMarker = `<!-- ci-dispatch-head-sha: ${wr.head_sha} -->`;

            // Dedupe by PR + head SHA. One bad commit can fail both a push workflow
            // and a PR workflow; a single ci-fix run is enough for that head SHA.
            const openTrackingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: AGENT_OWNER,
              repo: AGENT_REPO,
              state: 'open',
              labels: 'ci-failure-analysis',
              per_page: 100,
            });
            const existingForHead = openTrackingIssues.find((i) =>
              i.title.includes(prMarker) &&
              i.body?.includes(headShaMarker)
            );
            if (existingForHead) {
              core.info(
                `Tracking issue #${existingForHead.number} already exists for ${prMarker} ` +
                `at ${wr.head_sha} — skipping duplicate dispatch from ${workflowEvent}.`
              );
              return;
            }

            // Rolling cap: count recent ci-failure-analysis issues for this PR in skc-bc-internal-agents.
            const MAX_DISPATCHES = 15;
            const WINDOW_DAYS = 7;
            const since = new Date(
              Date.now() - WINDOW_DAYS * 24 * 60 * 60 * 1000
            )
              .toISOString()
              .slice(0, 10);
            const searchQ = `repo:${AGENT_OWNER}/${AGENT_REPO} is:issue label:ci-failure-analysis created:>=${since}`;
            const searchItems = await github.paginate(github.rest.search.issuesAndPullRequests, {
              q: searchQ,
              per_page: 100,
            });
            const recentForPr = searchItems.filter((i) => i.title.includes(prMarker));
            if (recentForPr.length >= MAX_DISPATCHES) {
              const msg = [
                '## ⚠️ CI auto-fix dispatch limit reached',
                '',
                `There have already been **${recentForPr.length}** CI failure tracking issues in **${AGENT_OWNER}/${AGENT_REPO}** for this PR in the last **${WINDOW_DAYS}** days (limit: **${MAX_DISPATCHES}**).`,
                'Automatic dispatch has stopped to avoid a runaway retry loop.',
                '',
                'Please fix the failing workflow manually or inspect the latest run logs.',
                '',
                `_skc-bc-internal-agents \`al-ci-dispatch\` — adjust \`MAX_DISPATCHES\` / \`WINDOW_DAYS\` in that workflow if needed._`,
              ].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: msg,
              }).catch((e) => core.warning(`Could not post cap comment on PR: ${e.message}`));
              core.warning(
                `Dispatch cap (${MAX_DISPATCHES}) reached for ${prMarker} in ${WINDOW_DAYS}d — skipping.`
              );
              return;
            }

            // --- Build issue body carrying all context for the agent ---
            // target_repo and pr_branch are needed so the fix agent can clone
            // and push to the correct repo/branch without ambiguity.
            const body = [
              '<!-- ci-analysis-context -->',
              `<!-- ci-dispatch-pr: ${prMarker} -->`,
              headShaMarker,
              `<!-- ci-dispatch-run-id: ${wr.id} -->`,
              'This issue was created automatically by the CI Failure Analysis Dispatcher.',
              'The skc-bc-internal-agents CI fix agent will analyse the failure, fix any AL code issues,',
              'and post a comment on the PR.',
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **Failing Workflow** | \`${wr.name}\` |`,
              `| **Workflow Run ID** | \`${wr.id}\` |`,
              `| **Pull Request** | #${prNumber} |`,
              `| **Head SHA** | \`${wr.head_sha}\` |`,
              `| **Head Branch** | \`${prBranch}\` |`,
              `| **Target Repo** | \`${targetRepo}\` |`,
              `| **Conclusion** | \`${wr.conclusion}\` |`,
              `| **Run URL** | ${wr.html_url} |`,
            ].join('\n');

            // Create tracking issue in skc-bc-internal-agents (not the deployed target repo)
            // so the skc-bc-internal-agents agents can read it with their native token.
            const { data: issue } = await github.rest.issues.create({
              owner: AGENT_OWNER,
              repo:  AGENT_REPO,
              title: `CI Failure: \`${wr.name}\` on ${targetRepo}#${prNumber}`,
              body,
              labels: ['ci-failure-analysis'],
            });

            core.info(
              `Created CI failure tracking issue #${issue.number} in ${AGENT_OWNER}/${AGENT_REPO} ` +
              `for ${targetRepo}#${prNumber}, run ${wr.id}`
            );

            // Dispatch the CI fix agent in skc-bc-internal-agents.
            // Retry transient 5xx / network failures from the Node 24 proxyFetch path.
            let lastErr;
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: AGENT_OWNER,
                  repo:  AGENT_REPO,
                  ref:   'main',
                  workflow_id: 'al-ci-fix.lock.yml',
                  inputs: {
                    issue_number: String(issue.number),
                  },
                });
                core.info(`Dispatched al-ci-fix workflow for issue #${issue.number} (attempt ${attempt})`);
                lastErr = null;
                break;
              } catch (err) {
                lastErr = err;
                const status = err.status ?? 0;
                if (status >= 400 && status < 500) throw err;
                if (attempt < 3) {
                  const delay = attempt * 5000;
                  core.warning(`Dispatch attempt ${attempt} failed (HTTP ${status || 'network'}): ${err.message} — retrying in ${delay / 1000}s…`);
                  await new Promise(r => setTimeout(r, delay));
                }
              }
            }

            if (lastErr) throw lastErr;
