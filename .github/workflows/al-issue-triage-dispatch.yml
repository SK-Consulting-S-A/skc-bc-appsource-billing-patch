name: "Issue Triage Dispatcher"

# Lightweight gate for issue triage. This keeps CI tracking issues and
# self-generated reports from spinning up the heavier agent workflow.

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  actions: write
  issues: read

concurrency:
  group: triage-dispatch-${{ github.repository_id }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.issue.title, 'Org Issue Scan') &&
      !contains(github.event.issue.title, 'Triage Report') &&
      !contains(github.event.issue.title, '[agentics]') &&
      !contains(github.event.issue.title, '[agent]') &&
      !startsWith(github.event.issue.title, 'CI Failure:') &&
      !contains(github.event.issue.body || '', '<!-- ci-analysis-context -->') &&
      !contains(toJson(github.event.issue.labels), '"name":"ci-failure-analysis"') &&
      !contains(toJson(github.event.issue.labels), '"name":"implemented"') &&
      (
        github.event.action != 'labeled' ||
        (
          github.event.label.name == 'triage-response' &&
          contains(github.event.issue.body || '', '### Context (added by skc-bc-internal-agents triage)') &&
          !contains(toJson(github.event.issue.labels), '"name":"ready-to-implement"')
        )
      )
    steps:
      - name: Dispatch issue triage agent
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8 (Node 24)
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || github.token }}
          script: |
            const ref = context.payload.repository.default_branch || 'main';
            const action = context.payload.action === 'labeled'
              ? 'clarification-received'
              : String(context.payload.action || 'opened');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              workflow_id: 'al-issue-triage.lock.yml',
              inputs: {
                issue_number: String(context.issue.number),
                issue_action: action,
                comment_id: '',
              },
            });
            core.info(`Dispatched al-issue-triage for issue #${context.issue.number} (${action})`);